groups:
  - name: qrl-alerts
    rules:
      - alert: NodeDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"

      - alert: FinalityDelay
        expr: (beacon_head_slot / 128 - beacon_finalized_epoch) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Finality delay exceeds 2 epochs on {{ $labels.instance }}"

      - alert: LowPeerCount
        expr: p2p_peer_count < 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low peer count ({{ $value }}) on {{ $labels.instance }}"