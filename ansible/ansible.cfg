[defaults]
inventory = inventory/hosts.ini
roles_path = roles
remote_user = ubuntu
private_key_file = ~/.ssh/cyyber-qrl-2-0-test-temporary.pem
host_key_checking = False
forks = 20
timeout = 30
pipelining = True
stdout_callback = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
