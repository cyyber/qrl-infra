---
- name: Download validator binary
  command: aws s3 cp "{{ validator_binary_url }}" /usr/local/bin/validator
  when: validator_binary_url != ""

- name: Set validator binary permissions
  file:
    path: /usr/local/bin/validator
    mode: "0755"
  when: validator_binary_url != ""

- name: Deploy validator systemd service
  template:
    src: validator.service.j2
    dest: /etc/systemd/system/validator.service
    mode: "0644"
  notify: restart validator

- name: Enable and start validator
  systemd:
    name: validator
    enabled: true
    state: started
    daemon_reload: true