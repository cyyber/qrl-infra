---
- name: Pull tx-spammer Docker image
  docker_image:
    name: "{{ spammer_docker_image }}"
    source: pull
    force_source: true

- name: Run tx-spammer container
  docker_container:
    name: tx-spammer
    image: "{{ spammer_docker_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: host
    command: >
      {{ spammer_scenario }}
      --rpchost http://{{ target_execution_ip }}:{{ gqrl_http_port | default(8545) }}
      {% if spammer_wallet_seed != '' %}--wallet-seed {{ spammer_wallet_seed }}{% endif %}
      {% if spammer_child_wallet_seed != '' %}--child-wallet-seed {{ spammer_child_wallet_seed }}{% endif %}
      --refill-amount {{ spammer_refill_amount }}
      --refill-balance {{ spammer_refill_balance }}
      --refill-interval {{ spammer_refill_interval }}
      {% if spammer_tx_count > 0 %}--count {{ spammer_tx_count }}{% endif %}
      {% if spammer_throughput > 0 %}--throughput {{ spammer_throughput }}{% endif %}
      {{ spammer_extra_flags }}
    log_driver: json-file
    log_options:
      max-size: "100m"
      max-file: "5"